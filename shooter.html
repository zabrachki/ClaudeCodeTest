<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foot Shooter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; overflow: hidden; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  #overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.75);
    color: #fff; font-family: 'Segoe UI', sans-serif;
  }
  #overlay h1 { font-size: 3rem; margin-bottom: 0.5rem; color: #FFD700; text-shadow: 0 0 20px #FFD700; }
  #overlay p  { font-size: 1.2rem; margin-bottom: 1.5rem; color: #ccc; }
  #overlay .score-display { font-size: 2rem; color: #fff; margin-bottom: 1.5rem; }
  #overlay button {
    padding: 0.8rem 2.5rem; font-size: 1.2rem; cursor: pointer;
    background: #FFD700; color: #111; border: none; border-radius: 8px;
    font-weight: bold; transition: transform 0.1s, box-shadow 0.1s;
    pointer-events: all;
  }
  #overlay button:hover { transform: scale(1.05); box-shadow: 0 0 15px #FFD700; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <h1 id="overlayTitle">👣 Foot Shooter</h1>
  <p id="overlayMsg">Defeat the smelly feet before they reach you!</p>
  <div class="score-display" id="overlayScore" style="display:none"></div>
  <button id="overlayBtn">Play</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayMsg = document.getElementById('overlayMsg');
const overlayScore = document.getElementById('overlayScore');
const overlayBtn = document.getElementById('overlayBtn');

// ─── Resize ───────────────────────────────────────────────────────────────────
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Input ────────────────────────────────────────────────────────────────────
const keys = {};
const mouse = { x: canvas.width / 2, y: canvas.height / 2, down: false };
window.addEventListener('keydown',   e => { keys[e.key] = true;  e.preventDefault(); });
window.addEventListener('keyup',     e => { keys[e.key] = false; });
canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mousedown', e => { if (e.button === 0) mouse.down = true; });
canvas.addEventListener('mouseup',   e => { if (e.button === 0) mouse.down = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ─── Constants ────────────────────────────────────────────────────────────────
const PLAYER_SPEED  = 220;
const BULLET_SPEED  = 500;
const FIRE_RATE     = 0.2;   // seconds between shots
const FOOT_W        = 44;
const FOOT_H        = 64;
const BASE_SPAWN    = 1.8;   // seconds between spawns
const BASE_ENEMY_SPD = 80;

// ─── Game State ───────────────────────────────────────────────────────────────
let state, player, enemies, bullets, particles;
let spawnTimer, fireTimer, killCount, phase;
let running = false;

function initGame() {
  state    = 'playing';
  killCount = 0;
  phase    = 0;

  player = {
    x: canvas.width  / 2,
    y: canvas.height - 120,
    angle: 0,
    lives: 3,
    invincible: 0,
    invFlash: 0,
  };

  enemies   = [];
  bullets   = [];
  particles = [];
  spawnTimer = 0;
  fireTimer  = 0;
  GameState.score = 0;

  overlay.style.display = 'none';
  running = true;
}

overlayBtn.addEventListener('click', () => {
  initGame();
  requestAnimationFrame(loop);
});

// ─── Drawing helpers ──────────────────────────────────────────────────────────

// Draw a foot shape centered at (0,0), pointing upward (heel at bottom).
// w=width, h=height, bodyColor, nailColor, ragged=bool
function drawFoot(w, h, bodyColor, nailColor, ragged) {
  const hw = w / 2;
  const toe = h * 0.32;   // toe region height
  const arch = h * 0.18;  // arch indent

  ctx.save();

  // Main foot body
  ctx.beginPath();
  // Start at heel bottom-center
  ctx.moveTo(0, h / 2);
  // Left side up
  ctx.bezierCurveTo(-hw * 0.9, h / 2, -hw, h * 0.1, -hw * 0.85, -h * 0.1);
  // Ball of foot (left)
  ctx.bezierCurveTo(-hw * 0.8, -h * 0.28, -hw * 0.7, -h * 0.35, -hw * 0.55, -h * 0.38);
  // Toe area top-left
  ctx.bezierCurveTo(-hw * 0.4, -h / 2 + 4, 0, -h / 2, hw * 0.3, -h / 2 + 6);
  // Big toe right side
  ctx.bezierCurveTo(hw * 0.6, -h / 2 + 8, hw * 0.85, -h * 0.35, hw * 0.9, -h * 0.2);
  // Right arch
  ctx.bezierCurveTo(hw * 0.95, -h * 0.05, hw * 0.7, h * 0.15, hw * 0.8, h * 0.3);
  // Heel right
  ctx.bezierCurveTo(hw * 0.9, h * 0.45, hw * 0.5, h / 2, 0, h / 2);
  ctx.closePath();

  ctx.fillStyle = bodyColor;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Toes (5 small ovals along top)
  const toePositions = [-hw * 0.62, -hw * 0.38, -hw * 0.12, hw * 0.1, hw * 0.32];
  const toeWidths    = [11, 10, 9.5, 9, 8];
  const toeHeights   = [14, 13, 12, 12, 10];
  const toeY         = -h * 0.42;

  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.ellipse(toePositions[i], toeY, toeWidths[i] / 2, toeHeights[i] / 2, 0, 0, Math.PI * 2);
    ctx.fillStyle = bodyColor;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Nail
    const nw = ragged ? toeWidths[i] * 0.6 : toeWidths[i] * 0.7;
    const nh = ragged ? toeHeights[i] * 0.35 : toeHeights[i] * 0.4;
    ctx.beginPath();
    if (ragged) {
      // Jagged nail
      const nx = toePositions[i] - nw / 2;
      const ny = toeY - toeHeights[i] / 2 + 1;
      ctx.moveTo(nx, ny + nh);
      ctx.lineTo(nx + nw * 0.1, ny);
      ctx.lineTo(nx + nw * 0.3, ny + nh * 0.5);
      ctx.lineTo(nx + nw * 0.5, ny + nh * 0.1);
      ctx.lineTo(nx + nw * 0.75, ny + nh * 0.6);
      ctx.lineTo(nx + nw, ny);
      ctx.lineTo(nx + nw, ny + nh);
      ctx.closePath();
    } else {
      ctx.ellipse(toePositions[i], toeY - toeHeights[i] / 2 + nh / 2 + 1, nw / 2, nh / 2, 0, 0, Math.PI * 2);
    }
    ctx.fillStyle = nailColor;
    ctx.fill();
  }

  ctx.restore();
}

// Stink lines above an enemy
function drawStinkLines(w, h, t) {
  const numLines = 3;
  const baseY = -h / 2 - 10;
  const xs = [-w * 0.3, 0, w * 0.3];

  ctx.save();
  ctx.strokeStyle = 'rgba(150, 230, 50, 0.7)';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';

  for (let i = 0; i < numLines; i++) {
    const phase = (t * 0.003) + i * 1.2;
    const lineH = 20 + i * 5;
    ctx.beginPath();
    ctx.moveTo(xs[i], baseY);
    for (let y = 0; y <= lineH; y += 2) {
      const x = xs[i] + Math.sin(phase + y * 0.4) * 5;
      ctx.lineTo(x, baseY - y);
    }
    ctx.globalAlpha = 0.5 + 0.3 * Math.sin(phase);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ─── Particle helpers ─────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 60 + Math.random() * 120;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      size: 4 + Math.random() * 5,
      color,
    });
  }
}

// ─── Game loop ────────────────────────────────────────────────────────────────
let lastTime = 0;

function loop(ts) {
  if (!running) return;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (state === 'playing') {
    update(dt, ts);
  }
  draw(ts);
  requestAnimationFrame(loop);
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update(dt, ts) {
  // Player movement
  let vx = 0, vy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) vx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) vx += 1;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) vy -= 1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) vy += 1;
  if (vx !== 0 && vy !== 0) { vx *= 0.707; vy *= 0.707; }

  player.x = Math.max(FOOT_W / 2, Math.min(canvas.width  - FOOT_W / 2, player.x + vx * PLAYER_SPEED * dt));
  player.y = Math.max(FOOT_H / 2, Math.min(canvas.height - FOOT_H / 2, player.y + vy * PLAYER_SPEED * dt));

  // Player rotation toward mouse
  player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x) + Math.PI / 2;

  // Invincibility countdown
  if (player.invincible > 0) {
    player.invincible -= dt;
    player.invFlash = (player.invFlash + dt * 10) % 1;
  }

  // Firing
  fireTimer -= dt;
  if (mouse.down && fireTimer <= 0) {
    fireTimer = FIRE_RATE;
    const dx = mouse.x - player.x;
    const dy = mouse.y - player.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    bullets.push({
      x: player.x,
      y: player.y,
      vx: (dx / dist) * BULLET_SPEED,
      vy: (dy / dist) * BULLET_SPEED,
      life: 1,
    });
  }

  // Spawn enemies
  spawnTimer -= dt;
  const spawnRate = Math.max(0.4, BASE_SPAWN - phase * 0.12);
  if (spawnTimer <= 0) {
    spawnTimer = spawnRate;
    const margin = 40;
    const bodyColor = `hsl(${Math.random() * 360 | 0}, ${55 + Math.random() * 30 | 0}%, ${40 + Math.random() * 20 | 0}%)`;
    const nailColor = `hsl(${Math.random() * 360 | 0}, 60%, 25%)`;
    enemies.push({
      x: margin + Math.random() * (canvas.width - margin * 2),
      y: -FOOT_H,
      speed: BASE_ENEMY_SPD + phase * 8 + Math.random() * 20,
      flash: 0,
      bodyColor,
      nailColor,
    });
  }

  // Move enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed * dt;
    if (e.flash > 0) e.flash -= dt * 4;

    // Enemy reached bottom — lose a life
    if (e.y > canvas.height + FOOT_H) {
      enemies.splice(i, 1);
      hurtPlayer();
      continue;
    }

    // Enemy touches player
    if (player.invincible <= 0) {
      const dx = e.x - player.x, dy = e.y - player.y;
      if (Math.abs(dx) < FOOT_W * 0.8 && Math.abs(dy) < FOOT_H * 0.8) {
        enemies.splice(i, 1);
        hurtPlayer();
      }
    }
  }

  // Move bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x < -20 || b.x > canvas.width + 20 || b.y < -20 || b.y > canvas.height + 20) {
      bullets.splice(i, 1);
      continue;
    }

    // Bullet vs enemies
    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      const dx = b.x - e.x, dy = b.y - e.y;
      if (Math.abs(dx) < FOOT_W * 0.6 && Math.abs(dy) < FOOT_H * 0.6) {
        spawnParticles(e.x, e.y, e.bodyColor, 10);
        enemies.splice(j, 1);
        bullets.splice(i, 1);
        hit = true;
        killCount++;
        GameState.score += 10;
        phase = Math.floor(killCount / 10);
        break;
      }
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 80 * dt; // gravity
    p.life -= dt * 1.5;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function hurtPlayer() {
  if (player.invincible > 0) return;
  player.lives--;
  player.invincible = 2.0;
  player.invFlash = 0;
  spawnParticles(player.x, player.y, '#FDBCB4', 15);
  if (player.lives <= 0) {
    state = 'gameover';
    showGameOver();
  }
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
const GameState = { score: 0 };

function draw(ts) {
  const W = canvas.width, H = canvas.height;

  // Background tile grid
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  const tileSize = 60;
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += tileSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += tileSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    ctx.restore();
  }

  // Enemies
  for (const e of enemies) {
    ctx.save();
    ctx.translate(e.x, e.y);
    // Enemies point downward (toward player)
    ctx.rotate(Math.PI);
    if (e.flash > 0) ctx.globalAlpha = 0.5 + e.flash * 0.5;
    drawFoot(FOOT_W, FOOT_H, e.bodyColor, e.nailColor, true);
    ctx.restore();

    // Stink lines drawn separately (above enemy, not rotated)
    ctx.save();
    ctx.translate(e.x, e.y);
    drawStinkLines(FOOT_W, FOOT_H, ts);
    ctx.restore();
  }

  // Player
  if (!(player.invincible > 0 && Math.sin(ts * 0.025) > 0)) {
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    drawFoot(FOOT_W, FOOT_H, '#FDBCB4', '#F48FB1', false);
    ctx.restore();
  }

  // Bullets
  for (const b of bullets) {
    ctx.save();
    ctx.translate(b.x, b.y);
    const angle = Math.atan2(b.vy, b.vx);
    ctx.rotate(angle);
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 8);
    grad.addColorStop(0, '#FFFDE7');
    grad.addColorStop(0.5, '#FFEE58');
    grad.addColorStop(1, 'rgba(255, 238, 88, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, 8, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // HUD
  drawHUD(ts);
}

function drawHUD(ts) {
  const pad = 20;

  // Score
  ctx.save();
  ctx.font = 'bold 28px "Segoe UI", sans-serif';
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 8;
  ctx.fillText(`Score: ${GameState.score}`, pad, pad + 28);
  ctx.restore();

  // Phase indicator
  if (phase > 0) {
    ctx.save();
    ctx.font = '16px "Segoe UI", sans-serif';
    ctx.fillStyle = 'rgba(255,200,50,0.7)';
    ctx.fillText(`Wave ${phase + 1}`, pad, pad + 56);
    ctx.restore();
  }

  // Lives (hearts)
  const heartSize = 28;
  const heartPad  = 8;
  for (let i = 0; i < 3; i++) {
    const x = canvas.width - pad - (3 - i) * (heartSize + heartPad);
    const y = pad + 4;
    drawHeart(x + heartSize / 2, y + heartSize / 2, heartSize / 2, i < player.lives);
  }
}

function drawHeart(cx, cy, r, filled) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx, cy + r * 0.4);
  ctx.bezierCurveTo(cx - r * 1.2, cy - r * 0.5, cx - r * 1.5, cy + r * 0.8, cx, cy + r * 1.5);
  ctx.bezierCurveTo(cx + r * 1.5, cy + r * 0.8, cx + r * 1.2, cy - r * 0.5, cx, cy + r * 0.4);
  ctx.fillStyle = filled ? '#e91e63' : 'rgba(255,255,255,0.15)';
  ctx.shadowColor = filled ? '#e91e63' : 'transparent';
  ctx.shadowBlur = filled ? 8 : 0;
  ctx.fill();
  ctx.restore();
}

function showGameOver() {
  overlayTitle.textContent = 'Game Over';
  overlayMsg.textContent   = 'The smelly feet overwhelmed you!';
  overlayScore.textContent = `Final Score: ${GameState.score}`;
  overlayScore.style.display = 'block';
  overlayBtn.textContent   = 'Play Again';
  overlay.style.display    = 'flex';
  running = false;
}

// Start the RAF loop once
requestAnimationFrame(ts => { lastTime = ts; });
</script>
</body>
</html>
